[delayed_gcode STARTUP_READ_FILAMENT_RACK_RFID] # Read RFID at startup to prevent RFID invalidation after boot-time scanning
initial_duration: 2
gcode:
  {action_respond_info("STARTUP_READ_FILAMENT_RACK_RFID")}
  FILAMENT_RACK

[gcode_macro Z_FAIL_PROTECT_HOTBED]
gcode:
  {% if printer.z_align.endstop_pin_status[0]|int == 0 %}
    FORCE_MOVE STEPPER=stepper_z DISTANCE=10 VELOCITY=10
  {% endif %}

[gcode_macro SET_PIN]
rename_existing: SET_PIN_BASE
gcode:
  {% set pin = params.PIN|default("")|lower %}
  {% set value = params.VALUE|float %}
  {% if pin == "fan0" %}
    {% if value == 0 %}
      SET_PIN_BASE PIN=fan0_en VALUE=0
    {% else %}
      SET_PIN_BASE PIN=fan0_en VALUE=1
    {% endif %}
  {% endif %}
  SET_PIN_BASE {rawparams}
