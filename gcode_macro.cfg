[gcode_macro G29]
gcode:
  {% if 'PROBE_COUNT' in params|upper %}
    {% set get_count = ('PROBE_COUNT' + params.PROBE_COUNT) %}
  {%else %}
    {% set get_count = "" %}
  {% endif %}

  {% set bed_temp = printer.custom_macro.default_bed_temp %}
  {% set extruder_temp = printer.custom_macro.g28_ext_temp %}
  {% set nozzle_clear_temp = printer.custom_macro.default_extruder_temp %}

  {% if 'BED_TEMP' in params|upper and params.BED_TEMP|default(0)|int >= printer.custom_macro.default_bed_temp %}
    {% set bed_temp = params.BED_TEMP %}
  {% endif %}

  {% if 'EXTRUDER_TEMP' in params|upper %}
    {% set nozzle_clear_temp = params.EXTRUDER_TEMP %}
  {% endif %}
  {% set enabled = printer["filament_switch_sensor filament_sensor"].enabled %}
  {% if enabled %}
    SET_FILAMENT_SENSOR SENSOR=filament_sensor ENABLE=0
  {% endif %}
  M104 S{extruder_temp}
  M140 S{bed_temp}
  {% if "xy" not in printer.toolhead.homed_axes %}
    G28 X Y
  {% endif %}
  # Z homing here must move downwards. After this optical levelling pass, do not restore the previous adjustments from Z_TILT_ADJUST.
  # Re-run Z_TILT_ADJUST above on every levelling cycle to generate fresh adjustment values.
  # Set the flag so that during ZDOWN, previous Z_TILT_ADJUST adjustment values are not restored.
  SET_G29_FLAG VALUE=1
  G28 Z
  BED_MESH_CLEAR
  NOZZLE_CLEAR
  M104 S{extruder_temp}
  M190 S{bed_temp}
  M109 S{extruder_temp}
  # After precision nozzle wipe, perform one optical levelling pass to capture max Z height
  ZDOWN_SWITCH ENABLE=1
  G28 Z
  BED_MESH_CLEAR
  Z_TILT_ADJUST WAITTIME=5
  NEXT_HOMEZ_NACCU
  G28 Z
  SET_G29_FLAG VALUE=0

  M204 S5000
  SET_VELOCITY_LIMIT ACCEL_TO_DECEL=5000
  BED_MESH_CALIBRATE {get_count}
  G1 Z175 F600
  BOX_MOVE_TO_SAFE_POS
  CXSAVE_CONFIG
  TURN_OFF_HEATERS
  {% if enabled %}
    SET_FILAMENT_SENSOR SENSOR=filament_sensor ENABLE=1
  {% endif %}

[gcode_macro BED_MANUAL_CAL_START]
