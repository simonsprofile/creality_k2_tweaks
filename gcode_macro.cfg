    NOZZLE_CLEAR
    NEXT_HOMEZ_NACCU
    G28 Z
  {% endif %}

  M204 S5000
  SET_VELOCITY_LIMIT ACCEL_TO_DECEL=5000
  BED_MESH_CALIBRATE {get_count} {get_gcode_file}
  G0 Z10 F600
  CXSAVE_CONFIG
  {% if enabled %}
    SET_FILAMENT_SENSOR SENSOR=filament_sensor ENABLE=1
  {% endif %}

[gcode_macro WAIT_BED_STABLE_POS]
