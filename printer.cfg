[lis2dw]
cs_pin: nozzle_mcu:PA4
spi_speed: 5000000
axes_map: x,z,y
spi_software_sclk_pin: nozzle_mcu:PA5
spi_software_mosi_pin: nozzle_mcu:PA7
spi_software_miso_pin: nozzle_mcu:PA6

[resonance_tester]
accel_chip: lis2dw
probe_points:
   130,130,130
min_freq: 20
max_freq: 120 
accel_per_hz: 100

[prtouch_v3]
z_offset: 0
speed: 5
samples: 1
samples_result: average
samples_tolerance_retries: 5
samples_tolerance: 0.5
# prth_clr_probe_pos:150,355
step_swap_pin: !PC7
pres_swap_pin: nozzle_mcu:PA15

prth_msg_show: True
#prth_dbg_ippt: 172.21.20.205

temp_non_linaer_a = -0.00000000
temp_non_linaer_b = 0.00000000
temp_non_linaer_c = 0.04500000

pres_cs0_pin: nozzle_mcu:PB13, nozzle_mcu:PB14
pres_tri_hold:4000, 10000, 500
# prth_tmp_comp: 26,300,0,0.135 # Non-linear temperature compensation by default. Use 26,300,0,0.11 for a 2.5 mm unthinned strain gauge with increased excitation voltage; use 26,300,0,0.135 for a thinned strain gauge.
enable_not_linear_comp:True # Enable non-linear temperature compensation (True=enabled, False=disabled/linear compensation)
pres_cfg_regs:60 #60（1280/128）44（640/128）56（1280/64）
# prth_min_fans:0.8 # 0.1 to 1.0. To maintain levelling accuracy, disable fans or reduce fan speed during probing.
# prth_gas_calr:0.001 # Square root of Gaussian filter standard deviation, 0.001 to 10. Smaller values apply weaker bed smoothing; commented out means disabled.
prth_max_chps:8
prth_tri_zacc:100
prth_min_fans:0.6

prth_clr_brush_pos = 151, 291#164, 291 ## # Midpoint of the wipe area on the silicone brush
prth_clr_probe_pos = 85, 265.5#95, 266.5 ## # Probe-height check position near the wipe area on the heated bed (rock_20240106)
prth_clr_pose = 160, 265.5, 10#153, 266.5, 10 ## # Nozzle wipe position on the heated bed (rock_20240106)

# regional_prtouch_switch: False # Regional levelling switch; default is True (enabled)
need_steady_regional:0.8 # Required stable region on the heated bed
horizontal_move_z_quick: 1 # mm lift height during probing

slot_left_pos = 195
slot_mid_pos = 170

[bed_mesh]
speed: 100
mesh_min: 5,5
mesh_max: 255,255
probe_count:11,11
mesh_pps: 2, 2
fade_start: 5.0 
fade_end: 50.0
bicubic_tension: 0.2
algorithm: bicubic
horizontal_move_z:5
split_delta_z: 0.01
move_check_distance: 1

[display_status]

[printer]
kinematics: corexy
max_velocity: 800
max_accel: 20000
max_accel_to_decel: 20000
max_z_velocity: 5
square_corner_velocity: 10
max_z_accel: 100

[pause_resume]

[exclude_object]

[z_align]
distance_ratio: 0.85  # Ratio for upward rapid-move distance
quick_speed: 10 # mm/s descent speed
slow_speed: 10 # mm/s probing speed
rising_dist: 10 # mm upward travel after first optical trigger
safe_dist: 40 # mm bed-tilt safety threshold; allowed descent on one side after the other optical sensor triggers
filter_cnt: 10 # Consecutive endstop trigger count used for filtering
timeout: 60 # s timeout for a single probing cycle
retries: 5 # Retry count
retry_tolerance: 10  # Maximum allowed deviation between the two optical sensors (10 steps, 0.0025 mm per step)
endstop_pin_z: PA15  # Optical trigger. Multi-optical configuration example: endstop_pin_z: PA15, PA8... Up to 4 supported
zd_up: 1  # Logic level when the stepper motor moves away from the limit switch
zes_untrig: 1  # Logic level when the limit switch is not triggered
zmax_safe_pox_diff: 2 # zmax_safe_pox = stepper_z position_max - zmax_safe_pox_diff

[belt_mdl mdlx]
ch_max_dis: 5 # Maximum module travel (mm)
ch_best_n:  140 # Optimal belt tension (N)
ch_best_error: 0.15   # Belt detection tolerance (±0.15)

[belt_mdl mdly]
ch_max_dis: 5 # Maximum module travel (mm)
ch_best_n:  140 # Optimal belt tension (N)
ch_best_error: 0.15   # Belt detection tolerance (±0.15)

[input_shaper]
#shaper_type_x = mzv
#shaper_freq_x = 50.8
#shaper_type_y = mzv
#shaper_freq_y = 23.6

