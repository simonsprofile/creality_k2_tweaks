# F021
# Printer_size: 350*350*350
# Version: v1.1.260206
# CreateDate: 2024/03/09
# Nozzle_mcu: chip: GD32F303CBT6
#             version: CR1FN200338C15
# mcu: chip: GD32F303RET6
#      version: CR4FN200338C15
# Updated: 2026/04/15
# Change log:
# - Set [virtual_sdcard] offset_value to 0.0 so Z offset can be managed cleanly from slicer profiles.

[include sensorless.cfg]
[include gcode_macro.cfg]
[include printer_params.cfg]
[include box.cfg]
[include motor_control.cfg]

[mcu]
serial: /dev/ttyS2
baud: 230400
restart_method: command

[mcu nozzle_mcu]
serial: /dev/ttyS3
baud: 230400
restart_method: command

[verify_heater extruder]
check_gain_time: 60
heating_gain: 1.0
[verify_heater heater_bed]
check_gain_time: 180
heating_gain: 1.0
hysteresis: 10

[mcu rpi]
serial: /tmp/klipper_host_mcu

[bl24c16f]
i2c_mcu: rpi
i2c_bus: i2c.1
i2c_speed: 400000

[idle_timeout]
timeout: 99999999

[virtual_sdcard]
path: /mnt/UDISK/printer_data/gcodes
offset_value: 0.0 # Neutral baseline; apply any first-layer Z adjustment in slicer profiles

[gcode_arcs]
resolution: 0.012 

[temperature_sensor mcu_temp]
sensor_type: temperature_mcu
min_temp: -30
max_temp: 100


[stepper_x]
step_pin: PB8
dir_pin: !PB7
enable_pin: !PA9
microsteps: 16
rotation_distance: 40
endstop_pin: PB11

position_endstop: 262
position_min: -12
position_max: 262
homing_speed: 100
homing_retract_dist: 10

[stepper_y]
step_pin: PB10
dir_pin: PB9
enable_pin: !PA8
microsteps: 16
rotation_distance: 40
endstop_pin: PB12
position_endstop: -3
position_min: -3
position_max: 296.5
homing_speed: 100
homing_retract_dist: 10

[stepper_z]
step_pin: PB6
dir_pin: !PB5
enable_pin: !PA10
microsteps: 16
rotation_distance:8
gear_ratio: 64:20
endstop_pin: probe:z_virtual_endstop
position_min: -10
position_max: 270
homing_speed: 5
second_homing_speed: 5
homing_retract_dist: 5

[tmc2208 stepper_z]
uart_pin: PC1
run_current: 0.84
stealthchop_threshold: 0.2
sense_resistor: 0.100

[thermistor my_thermistor]
temperature1:25
resistance1:98633
temperature2:220
resistance2:377
temperature3:320
resistance3:73

[extruder]
max_extrude_cross_section: 100
max_extrude_only_distance:1000.0
step_pin:nozzle_mcu:PB5
dir_pin: !nozzle_mcu:PB4
enable_pin:!nozzle_mcu:PB2
microsteps:16
rotation_distance:6.9
nozzle_diameter:0.400
filament_diameter:1.750
heater_pin:nozzle_mcu:PB8
sensor_type: my_thermistor
sensor_pin:nozzle_mcu:PA0
pressure_advance: 0.038
pressure_advance_smooth_time: 0.038
control:pid
pid_kp: 30.236
pid_ki: 3.475
pid_kd: 65.763
high_temp_value: 280
pid_kp_high_temp: 32.827
pid_ki_high_temp: 3.367
pid_kd_high_temp: 80.016
min_temp:-30# 0  20240326
max_temp:390

[thermistor custom_bed_thermistor]
temperature1: 25
resistance1: 100000
temperature2: 50
resistance2: 27586
temperature3: 100
resistance3: 6610

[heater_bed]
heater_pin: PC8
sensor_type: custom_bed_thermistor
sensor_pin: PC4
#control: pid 
#max_power: 0.5 
#pid_kp: 18.578
#pid_ki: 0.152
#pid_kd: 298.489
; 220v
pid_220_kp: 18.578
pid_220_ki: 0.152
pid_220_kd: 298.489
; 110v
pid_110_kp: 52.98
pid_110_ki: 0.849
pid_110_kd: 826.491
min_temp: -30
max_temp: 115
# power calibrate
power_calibration_enable:0
power_calibration_wait_even_heating_time:0 # Preheat time (s)
power_calibration_start_temp:70 # Calibration start target temperature
power_calibration_end_temp:90 # Calibration end target temperature
power_calibration_sample_interval:0.1 # Temperature sampling interval (s)
power_calibration_sample_end_temp_offset:15 # End-of-calibration sampling temperature offset
power_calibration_sample_start_temp_offset:10 # Start-of-calibration sampling temperature offset
power_calibration_full_power_110_220_slop_divide:0.35 # Slope split between 110V and 220V power modes
power_calibration_power_220:0.5 # Configured power for 220V
power_calibration_power_110:1 # Configured power for 110V
power_calibration_max_calibrate_times:10 # Maximum calibration attempts
power_calibration_retry_times:3 # Calibration retries
power_calibration_heating_slope_low:0.45    # Heating slope lower bound (> low, C/s)
power_calibration_heating_slope_high:0.67   # Heating slope upper bound (< high, C/s)


[filament_switch_sensor filament_sensor]
pause_on_runout: true
switch_pin: ^!nozzle_mcu:PA11
runout_gcode:
  {% if printer.extruder.can_extrude|lower == 'true' %}
    G91
    G0 E30 F600
    G90
  {% endif %}
  BOX_CHECK_MATERIAL_REFILL


[multi_pin heater_fans]
  pins:nozzle_mcu:PB7
 
[heater_fan hotend_fan]
pin:multi_pin:heater_fans
heater:extruder
heater_temp:50.0

[output_pin fan0_en]
pin: nozzle_mcu: PB6

[output_pin fan0]
pin: !nozzle_mcu: PB15
pwm: True
cycle_time: 0.01
hardware_pwm: false
value: 0.00
scale: 255
shutdown_value: 0.0

[multi_pin heater_fan2]
pins:PB4

[output_pin fan2]
pin: multi_pin:heater_fan2
pwm: True
cycle_time: 0.0100
hardware_pwm: false
value: 0.00
scale: 255
shutdown_value: 0.0

[multi_pin chassis_fan]
pins:PB1,PB3

[output_pin fan1]
pin: multi_pin:chassis_fan
pwm: True
cycle_time: 0.0100
hardware_pwm: false
value: 0.00
scale: 255
shutdown_value: 0.0

[temperature_sensor chamber_temp]
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC5
min_temp: -30
max_temp: 125

[output_pin board_dissipation_fan]
pin: PA0

[duplicate_pin_override]
pins: PC5,PA0,PC7,PB7,PB8,PB9,PB10,PB5,PB6,PA1,PB15,PB11,PB12,PB13,PA10,PA9,PB2,PB14,PB3,PB1

[multi_pin filter_fan]
  pins:PB1,PB3

[temperature_fan chamber_fan]
pin:multi_pin: filter_fan
cycle_time: 0.0100
hardware_pwm: false
max_power: 1
shutdown_speed: 0
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC5
min_temp: -30
max_temp: 80
control: watermark
max_delta: 0.3
target_temp: 35.0
max_speed: 1.0
min_speed: 0.0

[multi_pin LED_pin]
pins:PB0,PA12

[output_pin LED]
pin:multi_pin:LED_pin
pwm: True
cycle_time: 0.010
value: 1

[output_pin extruder_fan]
pin: nozzle_mcu: PB1

[output_pin power]
pin: PC9

[output_pin ptc_power]
pin: PB2
value: 1

